name: Build Dashboard JSON

on:
  push:
    paths:
      - 'ALL TOKENS STATUS.xlsx'
      - 'ALL COMPLETED TOKENS.xlsx'
      - 'data/input/*.xlsx'
      - 'scripts/export_dashboard_json.py'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard JSON
        run: python scripts/export_dashboard_json.py

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/outputs/
          git diff --staged --quiet || git commit -m "chore: regenerate dashboard JSON [skip ci]"
          git push
